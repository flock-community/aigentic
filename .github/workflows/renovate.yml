name: Renovate

on:
  schedule:
    - cron: "0 4 * * 6" # Every Saturday at 4:00 AM UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Renovate
        uses: renovatebot/github-action@v41.x
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
          configurationFile: renovate.json
